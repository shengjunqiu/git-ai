services:
  report-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: git-ai-report:latest
    container_name: git-ai-report-server
    ports:
      - "${REPORT_PORT:-8787}:8787"
    environment:
      GIT_AI_REPORT_ADDR: 0.0.0.0:8787
      GIT_AI_REPORT_DB: /data/report.sqlite
      GIT_AI_ASYNC_MODE: "false"
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - "${DATA_DIR:-./data}:/data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/api/v1/aggregate/summary"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
