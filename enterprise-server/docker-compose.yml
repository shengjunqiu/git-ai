services:
  # Enterprise Server API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://gitai:gitai@postgres:5432/gitai_enterprise
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=git-ai-cas
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION=us-east-1
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - RUST_LOG=git_ai_enterprise_server=info,tower_http=warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gitai
      POSTGRES_PASSWORD: gitai
      POSTGRES_DB: gitai_enterprise
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitai -d gitai_enterprise"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO (S3-compatible CAS storage)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # MinIO initialization - create bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/git-ai-cas --ignore-existing;
      echo 'Bucket created';
      "
    profiles:
      - init

volumes:
  pgdata:
  minio_data:
