services:
  # Enterprise Server API
  api:
    build:
      context: ..
      dockerfile: enterprise-server/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./static:/data/static:ro
    environment:
      - DATABASE_URL=postgresql://gitai:gitai@postgres:5432/gitai_enterprise
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=git-ai-cas
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION=us-east-1
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - AUTH_PASSWORD_CONCURRENCY=${AUTH_PASSWORD_CONCURRENCY:-8}
      - METRICS_WRITE_ROLLUPS=${METRICS_WRITE_ROLLUPS:-true}
      - DASHBOARD_USE_ROLLUPS=${DASHBOARD_USE_ROLLUPS:-true}
      - RATE_LIMIT_METRICS_MAX_REQUESTS=${RATE_LIMIT_METRICS_MAX_REQUESTS:-60}
      - RATE_LIMIT_METRICS_WINDOW_SECONDS=${RATE_LIMIT_METRICS_WINDOW_SECONDS:-60}
      - RATE_LIMIT_CAS_UPLOAD_MAX_REQUESTS=${RATE_LIMIT_CAS_UPLOAD_MAX_REQUESTS:-30}
      - RATE_LIMIT_CAS_UPLOAD_WINDOW_SECONDS=${RATE_LIMIT_CAS_UPLOAD_WINDOW_SECONDS:-60}
      - RATE_LIMIT_CAS_READ_MAX_REQUESTS=${RATE_LIMIT_CAS_READ_MAX_REQUESTS:-100}
      - RATE_LIMIT_CAS_READ_WINDOW_SECONDS=${RATE_LIMIT_CAS_READ_WINDOW_SECONDS:-60}
      - RATE_LIMIT_OAUTH_MAX_REQUESTS=${RATE_LIMIT_OAUTH_MAX_REQUESTS:-600}
      - RATE_LIMIT_OAUTH_WINDOW_SECONDS=${RATE_LIMIT_OAUTH_WINDOW_SECONDS:-60}
      - RATE_LIMIT_AUTH_MAX_REQUESTS=${RATE_LIMIT_AUTH_MAX_REQUESTS:-300}
      - RATE_LIMIT_AUTH_WINDOW_SECONDS=${RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}
      - RATE_LIMIT_ADMIN_MAX_REQUESTS=${RATE_LIMIT_ADMIN_MAX_REQUESTS:-300}
      - RATE_LIMIT_ADMIN_WINDOW_SECONDS=${RATE_LIMIT_ADMIN_WINDOW_SECONDS:-60}
      - RATE_LIMIT_DEFAULT_MAX_REQUESTS=${RATE_LIMIT_DEFAULT_MAX_REQUESTS:-300}
      - RATE_LIMIT_DEFAULT_WINDOW_SECONDS=${RATE_LIMIT_DEFAULT_WINDOW_SECONDS:-60}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-git_ai_enterprise_server=info,tower_http=warn}
      - LOG_FORMAT=${LOG_FORMAT:-compact}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILES:-5}"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      POSTGRES_USER: gitai
      POSTGRES_PASSWORD: gitai
      POSTGRES_DB: gitai_enterprise
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitai -d gitai_enterprise"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO (S3-compatible CAS storage)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
